<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #667eea, #764ba2);
    font-family: Arial, sans-serif;
}

.card-ui {
    backdrop-filter: blur(12px);
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 40px;
    text-align: center;
    color: white;
    box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    width: 100%;
    max-width: 400px;
}

.btn-custom {
    border-radius: 12px;
    padding: 12px;
    font-size: 16px;
    transition: 0.2s;
}

.btn-custom:hover {
    transform: translateY(-2px);
}
</style>
</head>

<body>

<div class="card-ui">

    <h2 class="mb-4">Welcome 👋</h2>
    <p class="mb-4">Choose an action</p>

    <div class="d-grid gap-3">

        <!-- 🔍 CHECK BUTTON -->
        <a href="/check" class="btn btn-success btn-custom">
            🔍 Check Phishing
        </a>

        <!-- 🚨 REPORT -->
        <a href="/report" class="btn btn-danger btn-custom">
            🚨 Report Phishing
        </a>

        <!-- ❤️ BLOOD HELPER -->
        <a href="/find-donor" class="btn btn-warning btn-custom">
            ❤️ BloodDonorHelper
        </a>

    </div>

</div>
    <form action="/clearsession" method="post" style="display:inline;">
    <button type="submit" class="btn btn-outline-light btn-sm">
        Logout
    </button>
</form>

</body>
</html>
