<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Phishing URLs</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>Submitted Phishing URLs</h3>
        <a href="index.html" class="btn btn-outline-primary btn-sm">Add New URL</a>
    </div>

    <div class="card shadow">
        <div class="card-body">
            <ul class="list-group" id="urlList"></ul>
        </div>
    </div>
</div>

<script>
    const urlList = document.getElementById("urlList");

    async function loadUrls() {
        const response = await fetch("/phishurls");
        const urls = await response.json();

        urlList.innerHTML = "";

        if (urls.length === 0) {
            urlList.innerHTML = `
                <li class="list-group-item text-center text-muted">
                    No URLs submitted yet.
                </li>`;
            return;
        }

        urls.forEach(item => {

            const li = document.createElement("li");
            li.className = "list-group-item d-flex justify-content-between align-items-center";

            const span = document.createElement("span");
            span.textContent = item.url;

            const buttonDiv = document.createElement("div");

            // Edit Button
            const editBtn = document.createElement("button");
            editBtn.className = "btn btn-warning btn-sm me-2";
            editBtn.textContent = "Edit";
            editBtn.onclick = async () => {
                const newUrl = prompt("Enter new URL:", item.url);
                if (newUrl) {
                    await fetch(`/phishurls/${item.id}`, {
                        method: "PUT",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({ url: newUrl })
                    });
                    loadUrls();
                }
            };

            // Delete Button
            const deleteBtn = document.createElement("button");
            deleteBtn.className = "btn btn-danger btn-sm";
            deleteBtn.textContent = "Delete";
            deleteBtn.onclick = async () => {
                if (confirm("Are you sure you want to delete this URL?")) {
                    await fetch(`/phishurls/${item.id}`, {
                        method: "DELETE"
                    });
                    loadUrls();
                }
            };

            buttonDiv.appendChild(editBtn);
            buttonDiv.appendChild(deleteBtn);

            li.appendChild(span);
            li.appendChild(buttonDiv);

            urlList.appendChild(li);
        });
    }

    window.onload = loadUrls;
</script>

</body>
</html>
