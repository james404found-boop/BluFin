<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register Donor</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #1e1e2f, #2b2b45);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.card-ui {
    background: white;
    border-radius: 20px;
    padding: 30px;
    width: 100%;
    max-width: 500px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
}

h3 {
    color: #c9184a;
    font-weight: bold;
}

.btn-custom {
    border-radius: 10px;
}

.location-btn {
    background: #0d6efd;
    color: white;
    border-radius: 10px;
    margin-bottom: 10px;
}

.location-btn:hover {
    background: #0b5ed7;
}
</style>
</head>

<body>

<div class="card-ui">

<h3 class="text-center mb-3">🩸 Register as Blood Donor</h3>

<form id="donorForm">

    <div class="mb-2">
        <label>Full Name</label>
        <input type="text" id="name" class="form-control" required>
    </div>

    <div class="mb-2">
        <label>Phone Number</label>
        <input type="text" id="phone" class="form-control" required>
    </div>

    <div class="mb-2">
        <label>Address (Manual)</label>
        <input type="text" id="address" class="form-control" placeholder="City / Area">
    </div>

    <!-- 🔥 LOCATION BUTTON -->
    <button type="button" class="btn location-btn w-100" onclick="getLocation()">
        📍 Use My Current Location
    </button>

    <!-- hidden lat/lng -->
    <input type="hidden" id="lat">
    <input type="hidden" id="lng">

    <div class="mb-2">
        <label>Blood Group</label>
        <select id="blood" class="form-control" required>
            <option value="">Select</option>
            <option>A+</option><option>A-</option>
            <option>B+</option><option>B-</option>
            <option>O+</option><option>O-</option>
            <option>AB+</option><option>AB-</option>
        </select>
    </div>

    <div class="mb-2">
        <label>Age</label>
        <input type="number" id="age" class="form-control">
    </div>

    <div class="mb-2">
        <label>Gender</label>
        <select id="gender" class="form-control">
            <option value="">Select</option>
            <option>Male</option>
            <option>Female</option>
        </select>
    </div>

    <div class="d-grid mt-3">
        <button class="btn btn-danger btn-custom">Submit</button>
    </div>

</form>

<div id="msg" class="mt-3"></div>

<div class="text-center mt-3">
    <a href="/find-donor">⬅ Back</a>
</div>

</div>

<script>
// 📍 GET GPS LOCATION
function getLocation() {
    if (!navigator.geolocation) {
        alert("Geolocation not supported");
        return;
    }

    navigator.geolocation.getCurrentPosition(
        (pos) => {
            document.getElementById("lat").value = pos.coords.latitude;
            document.getElementById("lng").value = pos.coords.longitude;

            alert("Location captured successfully ✅");
        },
        () => {
            alert("Location permission denied ❌");
        }
    );
}


// 🚀 SUBMIT
document.getElementById("donorForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const data = {
        name: document.getElementById("name").value,
        phone: document.getElementById("phone").value,
        address: document.getElementById("address").value,
        blood: document.getElementById("blood").value,
        age: document.getElementById("age").value,
        gender: document.getElementById("gender").value,
        lat: document.getElementById("lat").value,
        lng: document.getElementById("lng").value
    };

    const res = await fetch("/register-donor", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    });

    const result = await res.json();

    document.getElementById("msg").innerHTML =
        `<div class="alert alert-success">${result.message || "Registered successfully!"}</div>`;
});
</script>

</body>
</html>
