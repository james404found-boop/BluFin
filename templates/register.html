<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #667eea, #764ba2);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.card-ui {
    backdrop-filter: blur(12px);
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 30px;
    color: white;
    box-shadow: 0 8px 30px rgba(0,0,0,0.2);
}

.form-control {
    border-radius: 10px;
}

.btn-primary {
    border-radius: 10px;
}

.toggle-password {
    cursor: pointer;
    position: absolute;
    right: 15px;
    top: 38px;
}
</style>
</head>

<body>

<div class="container">
<div class="row justify-content-center">
<div class="col-md-5">

<div class="card-ui">

<h3 class="text-center mb-4">Create Account 🚀</h3>

<form id="registerForm" novalidate>

<div class="mb-3">
    <label>Aadhaar Number</label>
    <input type="text" id="aadhaar" class="form-control" placeholder="12-digit Aadhaar">
    <div class="invalid-feedback">Enter valid 12-digit Aadhaar</div>
</div>

<div class="mb-3">
    <label>Email</label>
    <input type="email" id="email" class="form-control" placeholder="Enter email">
    <div class="invalid-feedback">Enter valid email</div>
</div>

<div class="mb-3">
    <label>Phone</label>
    <input type="text" id="phone" class="form-control" placeholder="10-digit phone">
    <div class="invalid-feedback">Enter valid phone number</div>
</div>

<div class="mb-3 position-relative">
    <label>Password</label>
    <input type="password" id="password" class="form-control">
    <span class="toggle-password" onclick="togglePassword('password')">👁️</span>
    <div class="invalid-feedback">Min 6 characters required</div>
</div>

<div class="mb-3 position-relative">
    <label>Confirm Password</label>
    <input type="password" id="confirm_password" class="form-control">
    <span class="toggle-password" onclick="togglePassword('confirm_password')">👁️</span>
    <div class="invalid-feedback">Passwords must match</div>
</div>

<div class="d-grid">
    <button id="registerBtn" type="submit" class="btn btn-primary">
        Register
    </button>
</div>

</form>

<div id="responseMsg" class="mt-3"></div>

<div class="text-center mt-3">
    <a href="/" class="text-light">Already have an account? Login</a>
</div>

</div>

</div>
</div>
</div>

<script>
const form = document.getElementById("registerForm");
const btn = document.getElementById("registerBtn");
const msgDiv = document.getElementById("responseMsg");

function showMessage(type, message) {
    msgDiv.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
}

function togglePassword(id) {
    const field = document.getElementById(id);
    field.type = field.type === "password" ? "text" : "password";
}

function validate() {
    let valid = true;

    const aadhaar = document.getElementById("aadhaar");
    const email = document.getElementById("email");
    const phone = document.getElementById("phone");
    const password = document.getElementById("password");
    const confirm = document.getElementById("confirm_password");

    // Aadhaar: 12 digits
    if (!/^\d{12}$/.test(aadhaar.value)) {
        aadhaar.classList.add("is-invalid");
        valid = false;
    } else aadhaar.classList.remove("is-invalid");

    // Email
    if (!email.value.includes("@")) {
        email.classList.add("is-invalid");
        valid = false;
    } else email.classList.remove("is-invalid");

    // Phone: 10 digits
    if (!/^\d{10}$/.test(phone.value)) {
        phone.classList.add("is-invalid");
        valid = false;
    } else phone.classList.remove("is-invalid");

    // Password length
    if (password.value.length < 6) {
        password.classList.add("is-invalid");
        valid = false;
    } else password.classList.remove("is-invalid");

    // Confirm password
    if (password.value !== confirm.value || !confirm.value) {
        confirm.classList.add("is-invalid");
        valid = false;
    } else confirm.classList.remove("is-invalid");

    return valid;
}

form.addEventListener("submit", async (e) => {
    e.preventDefault();
    msgDiv.innerHTML = "";

    if (!validate()) return;

    btn.disabled = true;
    btn.innerHTML = "Registering...";

    const data = {
        aadhaar_number: document.getElementById("aadhaar").value.trim(),
        email: document.getElementById("email").value.trim(),
        phone_number: document.getElementById("phone").value.trim(),
        password: document.getElementById("password").value
    };

    try {
        const response = await fetch("/register", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(data)
        });

        let result;
        try {
            result = await response.json();
        } catch {
            throw new Error("Invalid server response");
        }

        if (response.ok) {
            showMessage("success", result.message || "Registration successful!");

            form.reset();

            setTimeout(() => {
                window.location.href = "/";
            }, 1500);

        } else {
            showMessage("danger", result.error || "Registration failed");
        }

    } catch (err) {
        showMessage("danger", err.message || "Server error. Try again.");
    } finally {
        btn.disabled = false;
        btn.innerHTML = "Register";
    }
});
</script>

</body>
</html>
