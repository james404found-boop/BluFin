<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background: linear-gradient(135deg, #667eea, #764ba2);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .login-card {
        backdrop-filter: blur(12px);
        background: rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        padding: 30px;
        color: white;
        box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    }

    .form-control {
        border-radius: 10px;
    }

    .btn-primary {
        border-radius: 10px;
    }

    .toggle-password {
        cursor: pointer;
        position: absolute;
        right: 15px;
        top: 38px;
    }
</style>
</head>

<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="login-card">

                <h3 class="text-center mb-4">Welcome Back 👋</h3>

                <form id="loginForm" novalidate>

                    <div class="mb-3">
                        <label>Email</label>
                        <input type="email" id="email" class="form-control" placeholder="Enter email">
                        <div class="invalid-feedback">Valid email required</div>
                    </div>

                    <div class="mb-3 position-relative">
                        <label>Password</label>
                        <input type="password" id="password" class="form-control" placeholder="Enter password">
                        <span class="toggle-password" onclick="togglePassword()">👁️</span>
                        <div class="invalid-feedback">Password required</div>
                    </div>

                    <div class="d-grid">
                        <button type="submit" id="loginBtn" class="btn btn-primary">
                            Login
                        </button>
                    </div>

                </form>

                <div id="responseMsg" class="mt-3"></div>

                <div class="text-center mt-3">
                    <a href="/register" class="text-light">Create account</a>
                </div>

            </div>

        </div>
    </div>
</div>

<script>
const form = document.getElementById("loginForm");
const btn = document.getElementById("loginBtn");
const msgDiv = document.getElementById("responseMsg");

function showMessage(type, message) {
    msgDiv.innerHTML = `
        <div class="alert alert-${type}">${message}</div>
    `;
}

function togglePassword() {
    const pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
}

function validateInputs() {
    let valid = true;

    const email = document.getElementById("email");
    const password = document.getElementById("password");

    if (!email.value || !email.value.includes("@")) {
        email.classList.add("is-invalid");
        valid = false;
    } else {
        email.classList.remove("is-invalid");
    }

    if (!password.value) {
        password.classList.add("is-invalid");
        valid = false;
    } else {
        password.classList.remove("is-invalid");
    }

    return valid;
}

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    msgDiv.innerHTML = "";

    if (!validateInputs()) return;

    btn.disabled = true;
    btn.innerHTML = "Logging in...";

    const data = {
        email: document.getElementById("email").value.trim(),
        password: document.getElementById("password").value
    };

    try {
        const response = await fetch("/login", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(data)
        });

        let result;
        try {
            result = await response.json();
        } catch {
            throw new Error("Invalid server response");
        }

        if (response.ok) {
            showMessage("success", result.message || "Login successful!");

            setTimeout(() => {
                window.location.href = "/home";
            }, 1200);

        } else {
            showMessage("danger", result.error || "Invalid credentials");
        }

    } catch (err) {
        showMessage("danger", err.message || "Server error. Try again.");
    } finally {
        btn.disabled = false;
        btn.innerHTML = "Login";
    }
});
</script>

</body>
</html>
