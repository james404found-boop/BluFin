<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phishing Risk Analyzer</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0;
}

.card-ui {
    backdrop-filter: blur(12px);
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 30px;
    color: white;
    box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    width: 100%;
    max-width: 500px;
}

.form-control {
    border-radius: 10px;
}

#previewImg {
    display: none;
    margin: 10px auto;
    max-width: 100%;
    max-height: 150px;
    border-radius: 10px;
    border: 1px solid #ddd;
}

.btn-custom {
    border-radius: 10px;
}

.alert {
    border-radius: 10px;
}

/* Loader */
.dots span {
    display:inline-block;
    width:10px;
    height:10px;
    margin:3px;
    background:white;
    border-radius:50%;
    animation: bounce 1.4s infinite;
}
.dots span:nth-child(2){ animation-delay:0.2s; }
.dots span:nth-child(3){ animation-delay:0.4s; }

@keyframes bounce {
    0%,80%,100% { transform: scale(0); }
    40% { transform: scale(1); }
}
</style>
</head>

<body>

<div class="card-ui">

    <h3 class="text-center mb-3">🔍 Phishing Risk Analyzer</h3>
    <p class="text-center mb-4">Provide any info (URL, text, or image)</p>

    <form id="checkForm" enctype="multipart/form-data">

        <div class="mb-3">
            <label>Email Content (optional)</label>
            <textarea name="Email" id="email" class="form-control"></textarea>
        </div>

        <div class="mb-3">
            <label>URL (optional)</label>
            <input type="text" name="Url" id="url" class="form-control">
        </div>

        <div class="mb-3">
            <label>Description (optional)</label>
            <textarea name="Description" id="description" class="form-control"></textarea>
        </div>

        <div class="mb-3">
            <label>Upload Image (optional)</label>
            <input type="file" name="Image" id="image" class="form-control" accept="image/*">
        </div>

        <img id="previewImg" alt="Preview">

        <div class="d-grid mt-3">
            <button id="submitBtn" type="submit" class="btn btn-primary btn-custom">
                Analyze
            </button>
        </div>

    </form>

    <!-- Loader -->
    <div id="loader" style="display:none; text-align:center; margin-top:15px;">
        <div class="dots">
            <span></span><span></span><span></span>
        </div>
        <p>Analyzing risk...</p>
    </div>

    <div id="msg" class="mt-3"></div>

</div>

<script>
const form = document.getElementById("checkForm");
const btn = document.getElementById("submitBtn");
const msg = document.getElementById("msg");

// Image preview
document.getElementById("image").addEventListener("change", function(e) {
    const file = e.target.files[0];
    const img = document.getElementById("previewImg");

    if (file) {
        img.src = URL.createObjectURL(file);
        img.style.display = "block";
    } else {
        img.style.display = "none";
    }
});

// Show message
function showMsg(type, text) {
    msg.innerHTML = `<div class="alert alert-${type}">${text}</div>`;
}

// Submit
form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const email = document.getElementById("email").value.trim();
    const url = document.getElementById("url").value.trim();
    const desc = document.getElementById("description").value.trim();
    const image = document.getElementById("image").files.length;

    if (!email && !url && !desc && !image) {
        showMsg("danger", "⚠️ Provide at least one input");
        return;
    }

    const formData = new FormData(form);

    btn.disabled = true;
    btn.innerHTML = "Processing...";
    document.getElementById("loader").style.display = "block";
    msg.innerHTML = "";

    try {
        const response = await fetch("/check", {
            method: "POST",
            body: formData
        });

        const data = await response.json();

        document.getElementById("loader").style.display = "none";

        let html = "";

        // 🔥 URL RISK SCORE
        if (data.url_analysis) {
            const score = data.url_analysis.score;

            let color = "success";
            let label = "Low Risk";

            if (score > 70) {
                color = "danger";
                label = "High Risk 🚨";
            } else if (score > 40) {
                color = "warning";
                label = "Medium Risk ⚠️";
            }

            html += `
                <div class="alert alert-${color}">
                    🔗 Risk Score: <strong>${score}%</strong><br>
                    Status: ${label}
                </div>
            `;

            if (data.url_analysis.reasons.length) {
                html += `<div class="alert alert-dark"><strong>Reasons:</strong><ul>`;
                data.url_analysis.reasons.forEach(r => {
                    html += `<li>${r}</li>`;
                });
                html += `</ul></div>`;
            }
        }

        // 🤖 AI RESULT
        html += `
            <div class="alert alert-info">
                🤖 AI Verdict: <strong>${data.ai_result}</strong>
            </div>
        `;

        msg.innerHTML = html;

    } catch (err) {
        document.getElementById("loader").style.display = "none";
        showMsg("danger", "❌ Error processing request");
    }

    btn.disabled = false;
    btn.innerHTML = "Analyze";
});
</script>

</body>
</html>
