<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blood Donor Finder</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #1e1e2f, #2b2b45);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0;
}

/* top button */
.top-btn {
    position: absolute;
    top: 20px;
    right: 20px;
}

/* main card */
.card-ui {
    background: #ffffff;
    border-radius: 20px;
    padding: 25px;
    width: 100%;
    max-width: 600px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
}

h3 {
    color: #c9184a;
    font-weight: bold;
}

/* inputs */
.form-control {
    border-radius: 10px;
}

/* button */
.btn-search {
    background: #c9184a;
    color: white;
    border-radius: 10px;
}

.btn-search:hover {
    background: #a4133c;
}

/* donor card */
.donor-card {
    background: #f8f9fa;
    padding: 15px;
    border-radius: 12px;
    margin-top: 12px;
    border-left: 5px solid #c9184a;
}

/* links */
.donor-card a {
    color: #c9184a;
    text-decoration: none;
    font-weight: bold;
}

.donor-card a:hover {
    text-decoration: underline;
}
</style>
</head>

<body>

<div class="top-btn">
    <a href="/register-donor" class="btn btn-danger shadow">
        🩸 Register
    </a>
</div>

<div class="card-ui">

<h3 class="text-center mb-3">❤️ Blood Donor Finder</h3>

<form id="searchForm">
    <input type="text" id="location" class="form-control mb-2" placeholder="Enter location">

    <select id="blood" class="form-control mb-2">
        <option value="">Select Blood Group</option>
        <option>A+</option><option>A-</option>
        <option>B+</option><option>B-</option>
        <option>O+</option><option>O-</option>
        <option>AB+</option><option>AB-</option>
    </select>

    <button class="btn btn-search w-100">Search</button>
</form>

<div id="results" class="mt-3"></div>

<div class="text-center mt-3">
    <a href="/home" class="text-muted">⬅ Back</a>
</div>

</div>

<script>
document.getElementById("searchForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const location = document.getElementById("location").value;
    const blood = document.getElementById("blood").value;

    const resDiv = document.getElementById("results");
    resDiv.innerHTML = "<div class='text-muted'>Searching...</div>";

    try {
        const res = await fetch("/find-donors", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ location, blood })
        });

        const data = await res.json();
        resDiv.innerHTML = "";

        if (!data.donors || data.donors.length === 0) {
            resDiv.innerHTML = "<div class='alert alert-warning'>No donors found</div>";
            return;
        }

        data.donors.forEach(d => {
            const mapsLink = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(d.location)}`;

            resDiv.innerHTML += `
                <div class="donor-card">
                    <strong>${d.name}</strong><br>
                    🩸 ${d.blood}<br>
                    📍 ${d.location}<br>

                    🔗 <a href="${mapsLink}" target="_blank">
                        View on Google Maps 📍
                    </a><br>

                    📞 <a href="tel:${d.phone}">${d.phone}</a>
                </div>
            `;
        });

    } catch (err) {
        resDiv.innerHTML = "<div class='alert alert-danger'>Server error</div>";
    }
});
</script>

</body>
</html>
