<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phishing Detector</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #1e293b;
            padding: 25px;
            border-radius: 12px;
            width: 400px;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            border-radius: 8px;
            border: none;
            resize: none;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            border: none;
            border-radius: 8px;
            background: #3b82f6;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #2563eb;
        }

        .result {
            margin-top: 20px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
        }

        .phishing {
            color: #ef4444;
        }

        .safe {
            color: #22c55e;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Phishing Detector</h2>

    <form id="form">
        <textarea name="input" id="input" placeholder="Paste message or URL here..."></textarea>
        <button type="submit">Check</button>
    </form>

    <div class="result" id="result"></div>
</div>

<script>
    const form = document.getElementById("form");
    const resultDiv = document.getElementById("result");

    form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const inputText = document.getElementById("input").value;

        const response = await fetch("/classify", {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded"
            },
            body: `input=${encodeURIComponent(inputText)}`
        });

        const data = await response.json();

        resultDiv.textContent = data.result;

        if (data.result === "PHISHING") {
            resultDiv.className = "result phishing";
        } else {
            resultDiv.className = "result safe";
        }
    });
</script>

</body>
</html>
