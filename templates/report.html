<!DOCTYPE html>
<html>
<head>
<title>Report Phishing</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-light d-flex justify-content-center align-items-center vh-100">

<div class="card p-4 bg-secondary" style="width:400px">

<h4 class="text-center">🚨 Report Phishing</h4>

<form id="reportForm" enctype="multipart/form-data">

<input type="text" name="Email" class="form-control mb-2" placeholder="Your Email">
<input type="text" name="Url" class="form-control mb-2" placeholder="Suspicious URL">
<textarea name="description" class="form-control mb-2" placeholder="Describe the issue"></textarea>

<input type="file" name="Image" class="form-control mb-2">

<button class="btn btn-danger w-100">Submit Report</button>

</form>

<div id="msg" class="mt-3"></div>

</div>

<script>
document.getElementById("reportForm").addEventListener("submit", async (e)=>{
    e.preventDefault();

    const formData = new FormData(e.target);

    const res = await fetch("/report", {
        method: "POST",
        body: formData
    });

    const data = await res.json();

    document.getElementById("msg").innerHTML =
        `<div class="alert alert-info">
            Verdict: ${data.verdict} <br>
            Score: ${data.score}%
        </div>`;
});
</script>

</body>
</html>
