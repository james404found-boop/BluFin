<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Submit URL</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body">
                    <h4 class="card-title text-center mb-4">Submit Phishing URL</h4>

                    <form id="urlForm">
                        <div class="mb-3">
                            <label class="form-label">Enter URL</label>
                            <input type="url" class="form-control" id="urlInput"
                                   placeholder="https://example.com" required>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">
                                Submit URL
                            </button>
                        </div>
                    </form>

                    <div id="responseMsg" class="mt-3 text-center"></div>

                    <div class="text-center mt-3">
                        <a href="/phishurls" class="btn btn-outline-secondary btn-sm">
                            View Submitted URLs
                        </a>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const form = document.getElementById("urlForm");

    form.addEventListener("submit", async function(event) {
        event.preventDefault();

        const urlValue = document.getElementById("urlInput").value;

        const response = await fetch("/submiturl", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ url: urlValue })
        });

        const msgDiv = document.getElementById("responseMsg");

        if (response.ok) {
            msgDiv.innerHTML = `<div class="alert alert-success">URL submitted successfully!</div>`;
            form.reset();
        } else {
            msgDiv.innerHTML = `<div class="alert alert-danger">Error submitting URL.</div>`;
        }
    });
</script>

</body>
</html>
